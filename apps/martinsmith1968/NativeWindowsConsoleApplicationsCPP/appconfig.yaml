version: 1

apps:
  - Id: My.Native.CPP.Console.Apps
    Description: My Native C++ Console Applications
    GroupName: Essentials
    OSType: x64
    SourceFolder: apps\martinsmith1968\NativeWindowsConsoleApplicationsCPP
    SourceWildcard: "*.zip"
    TargetFolder: msbin
    InstallType: ExtractZip
    InstallActions:
      - RenameReadmes
      - RenameLicence
      - RenameFAQ
      - RenameNews
      - ClearTargetFolder
    InstallParameters:
      ExtractCommand: e
      ExtractWildcard: "ReleaseU\\*.exe"

